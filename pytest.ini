[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short

[coverage:run]
omit =
    ui/*
    services/excel_service.py
    services/surveillance_service.py
    services/log_parser.py
    models/categorie.py
    tests/*
    main.py
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.:
show_missing = true
